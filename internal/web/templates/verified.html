<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Verified - NX Sandbox</title>
  <link rel="stylesheet" href="/static/css/ssr.css" />
</head>
<body class="min-h-screen bg-slate-950 text-slate-100 antialiased">
  <main class="mx-auto flex min-h-screen w-full max-w-lg items-center px-6 py-10">
    <section class="w-full rounded-2xl border border-emerald-900/50 bg-emerald-950/20 p-6">
      <h1 class="text-2xl font-semibold text-emerald-300">Session verified</h1>
      <p class="mt-2 text-sm text-slate-300">Redirecting to dashboard...</p>
    </section>
  </main>
  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const token = params.get('token');
      const expires = params.get('expires');
      const user = params.get('user');
      if (!token || !expires || !user) {
        window.location.href = '/signin';
        return;
      }
      localStorage.setItem('auth_token', token);
      localStorage.setItem('auth_token_expires', String(expires));
      localStorage.setItem('auth_user', atob(user));
      window.history.replaceState({}, '', '/verified');
      window.location.href = '/dashboard';
    })();
  </script>
</body>
</html>
