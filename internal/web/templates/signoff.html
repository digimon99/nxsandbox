<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Signed Off - NX Sandbox</title>
  <link rel="stylesheet" href="/static/css/ssr.css" />
</head>
<body class="min-h-screen bg-slate-950 text-slate-100 antialiased">
  <main class="mx-auto flex min-h-screen w-full max-w-lg items-center px-6 py-10">
    <section class="w-full rounded-2xl border border-slate-800 bg-slate-900/70 p-6">
      <p class="text-sm text-slate-300">Signing off...</p>
    </section>
  </main>
  <script>
    localStorage.removeItem('auth_token');
    localStorage.removeItem('auth_token_expires');
    localStorage.removeItem('auth_user');
    window.location.href = '/';
  </script>
</body>
</html>
